terms:
  GMV:
    status: defined
    definition: >
      Gross Merchandise Value. Total value of all orders before refunds and returns.
      Use SUM(orders.total_cents) / 100 for dollar amount. Filter by status != 'cancelled'
      for net GMV.
    tables:
      - orders

  AOV:
    status: defined
    definition: >
      Average Order Value. GMV divided by order count. Use AVG(orders.total_cents) / 100
      for dollar amount. Typically filtered to completed/non-cancelled orders.
    tables:
      - orders

  LTV:
    status: defined
    definition: >
      Customer Lifetime Value. Total revenue generated by a customer across all their
      orders. Use SUM(orders.total_cents) / 100 grouped by customer_id. Can be found
      pre-computed in customer_ltv_cache but the orders table is authoritative.
    tables:
      - orders
      - customers

  churn:
    status: defined
    definition: >
      A customer who has not placed an order in 180+ days and was previously active.
      Not a column — derived by comparing last order date to current date. is_active
      on customers is a related but separate flag.
    tables:
      - customers
      - orders

  conversion:
    status: defined
    definition: >
      The rate at which site visitors become paying customers. Calculated from
      cart_events and orders: orders placed / cart sessions started. Not directly
      in the core entities — requires joining to site analytics tables.
    tables:
      - orders
      - cart_events

  return_rate:
    status: defined
    definition: >
      Percentage of orders that result in a return request. Use COUNT(DISTINCT
      returns.order_id) / COUNT(DISTINCT orders.id). Note: a single order can
      have multiple return items but only one return record.
    tables:
      - returns
      - orders

  SKU:
    status: defined
    definition: >
      Stock Keeping Unit. A unique identifier for each product variant. Found in
      product_variants.sku. Products can have multiple SKUs (size, color variants).
    tables:
      - product_variants

  DTC:
    status: defined
    definition: >
      Direct-to-Consumer. NovaMart's own branded products sold directly to customers,
      as opposed to third-party marketplace sellers. DTC products have seller_id = NULL
      on the products table.
    tables:
      - products

  marketplace:
    status: defined
    definition: >
      Third-party seller products listed on NovaMart's platform. Marketplace products
      have a non-NULL seller_id on the products table. Sellers earn revenue minus
      commission_rate.
    tables:
      - products
      - sellers

  revenue:
    status: ambiguous
    note: >
      Could mean GMV (total order value from orders.total_cents), net revenue
      (GMV minus refunds), or seller revenue (after commission). ASK the user
      which definition they mean.
    possible_mappings:
      - orders.total_cents
      - payments.amount_cents
      - refunds (subtracted)

  price:
    status: ambiguous
    note: >
      products.price is in dollars. products.price_cents is in cents but 40% NULL.
      order_items.unit_price_cents and order_items.total_cents are in cents.
      Always clarify which price and confirm units.
    possible_mappings:
      - products.price
      - products.price_cents
      - order_items.unit_price_cents

  status:
    status: ambiguous
    note: >
      "status" appears on many tables with different meanings. ASK which entity:
      orders (pending/processing/shipped/delivered/cancelled), payments
      (pending/captured/failed/refunded), products (active/draft/archived),
      sellers (active/suspended/pending), returns (requested/approved/completed/rejected),
      shipments (label_created/in_transit/delivered), promotions (via is_active flag).
    possible_mappings:
      - orders.status
      - payments.status
      - products.status
      - sellers.status
      - returns.status
      - shipments.status

  name:
    status: ambiguous
    note: >
      "name" appears on products, categories, sellers (company_name), promotions,
      email_campaigns, and warehouses. ASK which entity the user means.
    possible_mappings:
      - products.name
      - categories.name
      - sellers.company_name
      - promotions.name
      - email_campaigns.name
      - warehouses.name

  shipping_cost:
    status: defined
    definition: >
      WARNING: orders.shipping_cost uses mixed units — some rows are in dollars,
      others in cents. This is a known data quality issue. Compare against
      orders.subtotal_cents and orders.tax_cents (which are consistently in cents)
      to detect anomalies. Values > 100 are likely in cents; values < 50 are likely
      in dollars.
    tables:
      - orders

  acquisition_source:
    status: defined
    definition: >
      How a customer was acquired (organic, paid_search, social, referral, email, etc.).
      WARNING: values have case inconsistencies (e.g. 'Organic' vs 'organic',
      'Paid_Search' vs 'paid_search'). Use LOWER() for reliable grouping.
    tables:
      - customers

  rating:
    status: ambiguous
    note: >
      product_reviews has both rating (integer 1-5, always populated) and
      rating_decimal (float, 70% NULL). Use rating for analysis unless the user
      specifically asks for decimal precision.
    possible_mappings:
      - product_reviews.rating
      - product_reviews.rating_decimal

  return_reason:
    status: defined
    definition: >
      The reason a customer initiated a return. Found in returns.reason.
      WARNING: values have case inconsistencies (e.g. 'Defective' vs 'defective',
      'Wrong Item' vs 'wrong item'). Use LOWER() or INITCAP() for reliable grouping.
    tables:
      - returns

  commission:
    status: defined
    definition: >
      The percentage NovaMart takes from marketplace seller transactions.
      Stored as sellers.commission_rate (decimal, e.g. 0.15 = 15%).
      Seller payout = order amount * (1 - commission_rate).
    tables:
      - sellers

  promotion:
    status: defined
    definition: >
      A discount applied to an order. Promotions have a code, type (percentage or
      fixed_amount), value, minimum order requirement (min_order_cents), and usage
      limits. orders.promotion_id links to the promotion used.
    tables:
      - promotions
      - orders
