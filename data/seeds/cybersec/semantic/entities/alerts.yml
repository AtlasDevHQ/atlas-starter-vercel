name: Alerts
type: fact_table
table: alerts
grain: one row per alert
description: |
  Security alerts generated by detection rules and monitoring systems.
  Each alert has a severity (can be NULL), title, status, source, and
  timestamps. Alerts can optionally be linked to incidents via incident_id
  (no formal FK constraint). Tracks acknowledgment timing for response
  metrics. Use for alert volume analysis, noise reduction, and
  alert-to-incident correlation.

dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key — unique alert identifier
    primary_key: true

  - name: organization_id
    sql: organization_id
    type: number
    description: Foreign key to organizations — which customer generated this alert

  - name: alert_rule_id
    sql: alert_rule_id
    type: number
    description: Foreign key to alert_rules — which detection rule triggered this alert

  - name: severity
    sql: severity
    type: string
    description: |
      Alert severity level. Can be NULL for some alerts where severity was
      not determined. Filter NULLs when aggregating by severity.
    sample_values: [critical, high, medium, low]

  - name: title
    sql: title
    type: string
    description: Short description / title of the alert

  - name: status
    sql: status
    type: string
    description: Current alert status
    sample_values: [new, acknowledged, investigating, resolved, dismissed]

  - name: incident_id
    sql: incident_id
    type: number
    description: |
      Reference to the incident this alert was escalated to. No formal FK
      constraint. NULL if the alert was not linked to an incident.

  - name: source
    sql: source
    type: string
    description: Detection source / system that generated the alert
    sample_values: [ids, siem, endpoint, network, cloud, manual]

  - name: created_at
    sql: created_at
    type: timestamp
    description: When the alert was generated

  - name: acknowledged_at
    sql: acknowledged_at
    type: timestamp
    description: When the alert was first acknowledged by an analyst (NULL if not acknowledged)

  - name: has_severity
    sql: CASE WHEN severity IS NOT NULL THEN true ELSE false END
    type: boolean
    description: Whether the alert has a severity assigned
    virtual: true

  - name: is_escalated
    sql: CASE WHEN incident_id IS NOT NULL THEN true ELSE false END
    type: boolean
    description: Whether the alert has been linked to an incident
    virtual: true

  - name: is_acknowledged
    sql: CASE WHEN acknowledged_at IS NOT NULL THEN true ELSE false END
    type: boolean
    description: Whether the alert has been acknowledged
    virtual: true

  - name: ack_time_minutes
    sql: |-
      CASE
        WHEN acknowledged_at IS NOT NULL
        THEN EXTRACT(EPOCH FROM (acknowledged_at - created_at)) / 60.0
      END
    type: number
    description: Minutes between alert creation and acknowledgment (NULL if not acknowledged)
    virtual: true

  - name: created_date
    sql: created_at::DATE
    type: date
    description: Date the alert was created (for daily grouping)
    virtual: true

  - name: created_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month the alert was created
    virtual: true

  - name: severity_or_unknown
    sql: COALESCE(severity, 'unknown')
    type: string
    description: Severity with NULL replaced by 'unknown' — use for grouping
    virtual: true
    sample_values: [critical, high, medium, low, unknown]

measures:
  - name: alert_count
    sql: id
    type: count_distinct
    description: Number of unique alerts

  - name: unacknowledged_count
    sql: CASE WHEN acknowledged_at IS NULL THEN id END
    type: count_distinct
    description: Number of alerts not yet acknowledged

  - name: escalated_count
    sql: CASE WHEN incident_id IS NOT NULL THEN id END
    type: count_distinct
    description: Number of alerts escalated to incidents

  - name: avg_ack_time_minutes
    sql: CASE WHEN acknowledged_at IS NOT NULL THEN EXTRACT(EPOCH FROM (acknowledged_at - created_at)) / 60.0 END
    type: avg
    description: Average minutes to acknowledge an alert

joins:
  - target_entity: Organizations
    relationship: many_to_one
    join_columns:
      from: organization_id
      to: id
    description: Each alert belongs to one organization

  - target_entity: Incidents
    relationship: many_to_one
    join_columns:
      from: incident_id
      to: id
    description: An alert may be linked to one incident (no formal FK)

use_cases:
  - Alert volume and noise analysis by source and severity
  - Alert-to-incident conversion rate (escalation rate)
  - Acknowledgment time tracking and SLA compliance
  - Source effectiveness — which detection systems generate actionable alerts
  - Alert trending over time for capacity planning

query_patterns:
  - name: alerts_by_severity
    description: Alert count by severity (including unknowns)
    sql: |-
      SELECT COALESCE(severity, 'unknown') AS severity,
             COUNT(*) AS alert_count,
             COUNT(*) FILTER (WHERE acknowledged_at IS NULL) AS unacknowledged,
             COUNT(*) FILTER (WHERE incident_id IS NOT NULL) AS escalated
      FROM alerts
      GROUP BY COALESCE(severity, 'unknown')
      ORDER BY alert_count DESC

  - name: alerts_by_source
    description: Alert volume and escalation rate by source
    sql: |-
      SELECT source,
             COUNT(*) AS alert_count,
             COUNT(*) FILTER (WHERE incident_id IS NOT NULL) AS escalated,
             ROUND(100.0 * COUNT(*) FILTER (WHERE incident_id IS NOT NULL) / COUNT(*), 1) AS escalation_pct,
             AVG(EXTRACT(EPOCH FROM (acknowledged_at - created_at)) / 60.0)
               FILTER (WHERE acknowledged_at IS NOT NULL) AS avg_ack_minutes
      FROM alerts
      GROUP BY source
      ORDER BY alert_count DESC

  - name: alert_trend
    description: Daily alert volume
    sql: |-
      SELECT created_at::DATE AS alert_date,
             COUNT(*) AS alert_count,
             COUNT(*) FILTER (WHERE COALESCE(severity, '') IN ('critical', 'high')) AS high_sev_count
      FROM alerts
      GROUP BY alert_date
      ORDER BY alert_date
