name: Vulnerabilities
type: dimension_table
table: vulnerabilities
grain: one row per known vulnerability (CVE)
description: |
  Known vulnerabilities from CVE databases. Each vulnerability has a unique
  CVE identifier, severity rating (text enum), optional CVSS score (~30% NULL),
  category classification, and publication date. This is a reference table —
  actual findings on assets are tracked in scan_results and vulnerability_instances.
  Use for threat landscape analysis and vulnerability prioritization.

dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key — unique vulnerability identifier
    primary_key: true

  - name: cve_id
    sql: cve_id
    type: string
    description: CVE identifier (e.g. CVE-2024-1234)
    sample_values: [CVE-2024-1234, CVE-2023-44271, CVE-2024-21762, CVE-2023-38545]

  - name: title
    sql: title
    type: string
    description: Short description / title of the vulnerability

  - name: description
    sql: description
    type: string
    description: Detailed description of the vulnerability and its impact

  - name: severity
    sql: severity
    type: string
    description: Severity classification (text enum)
    sample_values: [critical, high, medium, low, info]

  - name: cvss_score
    sql: cvss_score
    type: number
    description: |
      CVSS numeric score (0.0–10.0). NULL for ~30% of vulnerabilities where
      the score has not been assigned. Use COALESCE or filter NULLs when
      aggregating. Higher score = more severe.

  - name: category
    sql: category
    type: string
    description: Vulnerability category / classification
    sample_values: [remote_code_execution, sql_injection, cross_site_scripting, privilege_escalation, denial_of_service, buffer_overflow, authentication_bypass]

  - name: published_at
    sql: published_at
    type: timestamp
    description: When the vulnerability was publicly disclosed / published

  - name: created_at
    sql: created_at
    type: timestamp
    description: When the vulnerability was added to the Sentinel database

  - name: severity_rank
    sql: |-
      CASE severity
        WHEN 'critical' THEN 1
        WHEN 'high' THEN 2
        WHEN 'medium' THEN 3
        WHEN 'low' THEN 4
        WHEN 'info' THEN 5
        ELSE 6
      END
    type: number
    description: Numeric severity rank for sorting (1 = most severe)
    virtual: true

  - name: cvss_tier
    sql: |-
      CASE
        WHEN cvss_score IS NULL THEN 'Unscored'
        WHEN cvss_score >= 9.0 THEN 'Critical (9.0+)'
        WHEN cvss_score >= 7.0 THEN 'High (7.0-8.9)'
        WHEN cvss_score >= 4.0 THEN 'Medium (4.0-6.9)'
        ELSE 'Low (0-3.9)'
      END
    type: string
    description: CVSS score tier bucket (handles NULL scores)
    virtual: true
    sample_values: [Unscored, Critical (9.0+), High (7.0-8.9), Medium (4.0-6.9), Low (0-3.9)]

  - name: published_year
    sql: EXTRACT(YEAR FROM published_at)
    type: number
    description: Year the vulnerability was published
    virtual: true

  - name: published_month
    sql: TO_CHAR(published_at, 'YYYY-MM')
    type: string
    description: Year-month the vulnerability was published
    virtual: true

measures:
  - name: vulnerability_count
    sql: id
    type: count_distinct
    description: Number of unique vulnerabilities

  - name: avg_cvss
    sql: cvss_score
    type: avg
    description: Average CVSS score (excludes NULLs)

use_cases:
  - Vulnerability severity distribution analysis
  - CVE category trending and prioritization
  - CVSS score analysis for risk assessment
  - Threat landscape trending by publication date
  - Join to scan_results and vulnerability_instances for exposure analysis

query_patterns:
  - name: vulns_by_severity
    description: Vulnerability count by severity level
    sql: |-
      SELECT severity,
             COUNT(*) AS vuln_count,
             AVG(cvss_score) AS avg_cvss
      FROM vulnerabilities
      GROUP BY severity
      ORDER BY MIN(CASE severity
        WHEN 'critical' THEN 1 WHEN 'high' THEN 2
        WHEN 'medium' THEN 3 WHEN 'low' THEN 4 ELSE 5 END)

  - name: vulns_by_category
    description: Vulnerability count by category
    sql: |-
      SELECT category,
             COUNT(*) AS vuln_count,
             COUNT(*) FILTER (WHERE severity = 'critical') AS critical_count,
             AVG(cvss_score) AS avg_cvss
      FROM vulnerabilities
      GROUP BY category
      ORDER BY vuln_count DESC

  - name: recent_critical_vulns
    description: Recently published critical vulnerabilities
    sql: |-
      SELECT cve_id, title, cvss_score, category, published_at
      FROM vulnerabilities
      WHERE severity = 'critical'
      ORDER BY published_at DESC
      LIMIT 20
